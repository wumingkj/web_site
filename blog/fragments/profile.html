<style>
    .profile-container {
        max-width: 600px;
        margin: 100px auto 50px;
        padding: 0 20px;
    }
    .profile-card {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        padding: 40px;
        box-shadow: 0 20px 60px rgba(77, 171, 247, 0.15);
    }
    .profile-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .profile-avatar {
        width: 120px;
        height: 120px;
        margin: 0 auto 20px;
        background: var(--gradient-rainbow);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        border: 4px solid white;
        box-shadow: 0 10px 30px rgba(77, 171, 247, 0.3);
        cursor: pointer;
        transition: transform 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    .profile-avatar:hover { transform: scale(1.05); }
    .profile-avatar.has-image { background: #f5f5f5; }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-avatar .avatar-overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s; border-radius: 50%;
    }
    .profile-avatar:hover .avatar-overlay { opacity: 1; }
    .avatar-picker-overlay {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center;
    }
    .avatar-picker-overlay.active { display: flex; }
    .avatar-picker {
        background: white; border-radius: 20px; padding: 30px;
        max-width: 450px; width: 90%; max-height: 80vh; overflow-y: auto;
    }
    .avatar-picker h3 { text-align: center; margin-bottom: 20px; color: var(--text-dark); }
    .avatar-tabs { display: flex; margin-bottom: 20px; background: #f5f5f5; border-radius: 10px; padding: 4px; }
    .avatar-tabs button {
        flex: 1; padding: 10px; border: none; background: transparent;
        border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s;
    }
    .avatar-tabs button.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .upload-area {
        border: 2px dashed #ccc; border-radius: 12px; padding: 30px;
        text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 20px;
    }
    .upload-area:hover { border-color: var(--primary); background: rgba(77, 171, 247, 0.05); }
    .upload-area.dragover { border-color: var(--primary); background: rgba(77, 171, 247, 0.1); }
    .upload-area input { display: none; }
    .upload-preview { width: 100px; height: 100px; margin: 10px auto; border-radius: 50%; object-fit: cover; display: none; }
    .avatar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    .avatar-option {
        width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
        font-size: 30px; border-radius: 50%; cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
    }
    .avatar-option:hover { transform: scale(1.2); background: rgba(77, 171, 247, 0.1); }
    .avatar-option.selected { border-color: var(--primary); background: rgba(77, 171, 247, 0.2); }
    .avatar-picker-actions { display: flex; gap: 10px; }
    .avatar-picker-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .avatar-picker-actions .cancel { background: #eee; color: #666; }
    .avatar-picker-actions .confirm { background: var(--gradient-primary); }
    .default-avatar-option { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #ddd; text-align: center; }
    .default-avatar-option button {
        width: 100%; padding: 12px; background: rgba(231, 76, 60, 0.08); color: #c0392b;
        border: 1px solid rgba(231, 76, 60, 0.3); border-radius: 10px;
        font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .default-avatar-option button:hover { background: rgba(231, 76, 60, 0.15); border-color: #e74c3c; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .profile-username { font-size: 24px; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
    .profile-role { font-size: 14px; color: var(--text-light); padding: 4px 12px; background: rgba(77, 171, 247, 0.1); border-radius: 20px; display: inline-block; }
    .profile-info { margin-bottom: 30px; }
    .info-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed rgba(77, 171, 247, 0.2); }
    .info-item:last-child { border-bottom: none; }
    .info-label { color: var(--text-light); font-size: 14px; }
    .info-value { color: var(--text-dark); font-weight: 600; }
    .profile-actions { display: flex; flex-direction: column; gap: 12px; }
    .profile-btn {
        padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 600;
        cursor: pointer; transition: all 0.3s ease; text-align: center; text-decoration: none; border: none;
    }
    .profile-btn.primary { background: var(--gradient-primary); color: white; }
    .profile-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(77, 171, 247, 0.3); }
    .profile-btn.secondary { background: rgba(77, 171, 247, 0.1); color: var(--primary); border: 2px solid var(--primary); }
    .profile-btn.secondary:hover { background: var(--primary); color: white; }
    .profile-btn.danger { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 2px solid #e74c3c; }
    .profile-btn.danger:hover { background: #e74c3c; color: white; }
    .upload-progress-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.6); z-index: 20000; display: flex; align-items: center; justify-content: center;
    }
    .upload-progress-dialog {
        background: white; border-radius: 16px; padding: 30px 40px;
        text-align: center; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); min-width: 300px;
    }
    .upload-progress-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 20px; }
    .upload-progress-bar { height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
    .upload-progress-fill { height: 100%; background: linear-gradient(90deg, #4dabf7, #748ffc); border-radius: 4px; transition: width 0.3s ease; }
    .upload-progress-text { font-size: 14px; color: #666; }
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .login-prompt { text-align: center; padding: 40px; }
    .login-prompt h2 { margin-bottom: 15px; color: var(--text-dark); }
    .login-prompt p { color: var(--text-light); margin-bottom: 25px; }
    @media (max-width: 480px) {
        .profile-container { margin: 80px auto 30px; }
        .profile-card { padding: 30px 25px; }
        .profile-avatar { width: 100px; height: 100px; font-size: 50px; }
        .profile-username { font-size: 20px; }
    }
</style>

<div class="profile-card" id="profileCard">
    <div class="loading-state">
        <p>加载中...</p>
    </div>
</div>

<div class="avatar-picker-overlay" id="avatarPicker">
    <div class="avatar-picker">
        <h3>选择头像</h3>
        <div class="avatar-tabs">
            <button class="active" data-tab="upload">上传图片</button>
            <button data-tab="emoji">选择表情</button>
        </div>
        <div class="tab-content active" id="uploadTab">
            <div class="upload-area" id="uploadArea">
                <input type="file" id="avatarFile" accept="image/png,image/jpeg,image/gif,image/webp">
                <p>📁 点击或拖拽图片到此处上传</p>
                <p style="font-size: 12px; color: #999;">支持 PNG, JPG, GIF, WebP (最大10MB)</p>
                <img class="upload-preview" id="uploadPreview">
            </div>
            <div class="default-avatar-option">
                <button type="button" onclick="useDefaultAvatar()">清空头像</button>
            </div>
        </div>
        <div class="tab-content" id="emojiTab">
            <div class="avatar-grid" id="avatarGrid"></div>
        </div>
        <div class="avatar-picker-actions">
            <button class="cancel" onclick="closeAvatarPicker()">取消</button>
            <button class="confirm" onclick="confirmAvatar()">确认</button>
        </div>
    </div>
</div>

<script>
(function() {
    var avatarList = [
        '🧑', '👨', '👩', '🧔', '👴', '👵', '🧓', '👶', '👧', '👦',
        '👨\u200D💼', '👩\u200D💼', '👨\u200D💻', '👨\u200D🎤', '👩\u200D🎤', '🧑\u200D🎤', '🧑\u200D💻', '🧑\u200D🔬', '👨\u200D🔬', '👩\u200D🔬',
        '🤠', '🥸', '🤓', '😎', '🥳', '🤩', '😋', '🤗', '🫠', '😏',
        '😺', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾', '🐱'
    ];
    var selectedAvatar = null;
    var selectedFile = null;
    var currentUser = null;

    function formatSize(bytes) {
        if (bytes === 0) return '0 B';
        var k = 1024;
        var sizes = ['B', 'KB', 'MB', 'GB'];
        var i = Math.floor(Math.log(bytes) / Math.log(k));
        return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
    }

    async function loadProfile() {
        var card = document.getElementById('profileCard');
        try {
            var res = await fetch('/blog/api/auth.php?action=check', { credentials: 'same-origin' });
            var data = await res.json();
            if (!data.loggedin) {
                card.innerHTML = '<div class="login-prompt"><h2>未登录</h2><p>请先登录后查看个人信息</p><a href="/blog/pages/login.html" class="profile-btn primary">去登录</a></div>';
                return;
            }
            var userRes = await fetch('/blog/api/auth.php?action=user', { credentials: 'same-origin' });
            var userData = await userRes.json();
            if (!userData.success) {
                card.innerHTML = '<div class="login-prompt"><h2>获取用户信息失败</h2><p>请刷新页面重试</p></div>';
                return;
            }
            currentUser = userData.user;
            selectedAvatar = currentUser.avatar;
            renderProfile();
            initAvatarPicker();
        } catch (err) {
            card.innerHTML = '<div class="login-prompt"><h2>网络错误</h2><p>请刷新页面重试</p></div>';
        }
    }

    function renderProfile() {
        var card = document.getElementById('profileCard');
        var user = currentUser;
        var avatarSrc = user.avatar || '/assets/images/default_avatar.jpg';
        var isImage = avatarSrc.indexOf('data:image') === 0 || avatarSrc.indexOf('/data/avatars') === 0 || avatarSrc.indexOf('/assets/images/') === 0;
        var avatarHtml = isImage ? '<img src="' + avatarSrc + '" alt="头像">' : avatarSrc;
        card.innerHTML =
            '<div class="profile-header">' +
            '<div class="profile-avatar ' + (isImage ? 'has-image' : '') + '" onclick="window._profileOpenAvatarPicker()">' + avatarHtml + '</div>' +
            '<div class="profile-username">' + user.username + '</div>' +
            '<div class="profile-role">' + (user.role === 'admin' ? '管理员' : '普通用户') + '</div>' +
            '</div>' +
            '<div class="profile-info">' +
            '<div class="info-item"><span class="info-label">用户名</span><span class="info-value">' + user.username + '</span></div>' +
            '<div class="info-item"><span class="info-label">邮箱</span><span class="info-value">' + (user.email || '未设置邮箱') + '</span></div>' +
            '<div class="info-item"><span class="info-label">注册时间</span><span class="info-value">' + formatDate(user.created_at) + '</span></div>' +
            '</div>' +
            '<div class="profile-actions">' +
            (user.role === 'admin' ? '<a href="/blog/pages/admin.html" class="profile-btn secondary">⚙️ 管理后台</a>' : '') +
            '<button class="profile-btn secondary" onclick="window._profileChangePassword()">修改密码</button>' +
            '<button class="profile-btn danger" onclick="window._profileLogout()">退出登录</button>' +
            '</div>';
    }

    function formatDate(dateStr) {
        if (!dateStr) return '未知';
        return new Date(dateStr).toLocaleDateString('zh-CN');
    }

    window._profileLogout = async function() {
        if (typeof Toast === 'undefined') return;
        var confirmed = await Toast.confirm({ message: '退出登录后需要重新登录，确定要退出吗？', title: '退出登录', type: 'warning', confirmText: '退出', cancelText: '取消' });
        if (!confirmed) return;
        try {
            await fetch('/blog/api/auth.php?action=logout', { credentials: 'same-origin' });
            Toast.success('已退出登录');
            if (window.WumingBlog && window.WumingBlog.clearAuthUI) {
                window.WumingBlog.clearAuthUI();
            }
            setTimeout(function() { (window.__navigate || function(u) { window.location.href = u; })('/blog/'); }, 1000);
        } catch (err) { Toast.error('退出失败，请重试'); }
    };

    window._profileChangePassword = function() {
        var newPwd = prompt('请输入新密码（至少6位）：');
        if (!newPwd || newPwd.length < 6) { if (newPwd) Toast.warning('密码至少6位'); return; }
        var confirmPwd = prompt('请再次输入新密码：');
        if (newPwd !== confirmPwd) { Toast.warning('两次输入的密码不一致'); return; }
        Toast.info('密码修改功能开发中...');
    };

    window._profileOpenAvatarPicker = function() {
        document.getElementById('avatarPicker').classList.add('active');
    };

    window.closeAvatarPicker = function() {
        document.getElementById('avatarPicker').classList.remove('active');
        selectedFile = null;
        document.getElementById('uploadPreview').style.display = 'none';
        document.getElementById('avatarFile').value = '';
    };

    window.useDefaultAvatar = function() {
        selectedAvatar = '👤';
        selectedFile = null;
        document.getElementById('uploadPreview').style.display = 'none';
        document.querySelectorAll('.avatar-option').forEach(function(el) { el.classList.remove('selected'); });
        Toast.info('将使用默认头像');
    };

    window.confirmAvatar = async function() {
        if (selectedFile) {
            var formData = new FormData();
            formData.append('avatar', selectedFile);
            var confirmBtn = document.querySelector('.avatar-picker-actions .confirm');
            var originalText = confirmBtn.textContent;
            confirmBtn.disabled = true;
            var progressOverlay = document.createElement('div');
            progressOverlay.className = 'upload-progress-overlay';
            progressOverlay.innerHTML = '<div class="upload-progress-dialog"><div class="upload-progress-title">正在上传头像</div><div class="upload-progress-bar"><div class="upload-progress-fill" style="width: 0%"></div></div><div class="upload-progress-text">准备上传...</div></div>';
            document.body.appendChild(progressOverlay);
            return new Promise(function(resolve) {
                var xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', function(e) {
                    if (e.lengthComputable) {
                        var percent = Math.round((e.loaded / e.total) * 100);
                        var fill = progressOverlay.querySelector('.upload-progress-fill');
                        var text = progressOverlay.querySelector('.upload-progress-text');
                        fill.style.width = percent + '%';
                        text.textContent = '已上传 ' + percent + '% (' + formatSize(e.loaded) + ' / ' + formatSize(e.total) + ')';
                        confirmBtn.textContent = '上传中 ' + percent + '%';
                        if (percent >= 100) {
                            fill.style.background = 'linear-gradient(90deg, #51cf66, #20c997)';
                            text.textContent = '上传完成，服务器处理中...';
                            confirmBtn.textContent = '处理中...';
                        }
                    }
                });
                xhr.addEventListener('load', function() {
                    progressOverlay.remove();
                    confirmBtn.textContent = originalText;
                    confirmBtn.disabled = false;
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            currentUser.avatar = data.avatar;
                            renderProfile();
                            closeAvatarPicker();
                            Toast.success('头像更新成功');
                            if (WumingBlog.currentUser) { WumingBlog.currentUser.avatar = data.avatar; WumingBlog.updateAuthUI(WumingBlog.currentUser); }
                        } else { Toast.error(data.message || '上传失败'); }
                    } catch (err) { Toast.error('服务器响应错误: ' + xhr.status); }
                    resolve();
                });
                xhr.addEventListener('error', function() { progressOverlay.remove(); confirmBtn.textContent = originalText; confirmBtn.disabled = false; Toast.error('网络错误，请重试'); resolve(); });
                xhr.addEventListener('timeout', function() { progressOverlay.remove(); confirmBtn.textContent = originalText; confirmBtn.disabled = false; Toast.error('上传超时'); resolve(); });
                xhr.addEventListener('abort', function() { progressOverlay.remove(); confirmBtn.textContent = originalText; confirmBtn.disabled = false; resolve(); });
                xhr.timeout = 120000;
                xhr.open('POST', '/blog/api/auth.php?action=upload-avatar');
                xhr.withCredentials = true;
                xhr.send(formData);
            });
        } else if (selectedAvatar) {
            var confirmBtn = document.querySelector('.avatar-picker-actions .confirm');
            var originalText = confirmBtn.textContent;
            confirmBtn.textContent = '保存中...';
            confirmBtn.disabled = true;
            try {
                var res = await fetch('/blog/api/auth.php?action=update-avatar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ avatar: selectedAvatar })
                });
                var data = await res.json();
                if (data.success) {
                    currentUser.avatar = selectedAvatar;
                    renderProfile();
                    closeAvatarPicker();
                    Toast.success('头像更新成功');
                    if (WumingBlog.currentUser) { WumingBlog.currentUser.avatar = selectedAvatar; WumingBlog.updateAuthUI(WumingBlog.currentUser); }
                } else { Toast.error(data.message || '更新失败'); }
            } catch (err) { Toast.error('网络错误'); }
            confirmBtn.textContent = originalText;
            confirmBtn.disabled = false;
        } else { Toast.warning('请选择头像'); }
    };

    function initAvatarPicker() {
        var tabs = document.querySelectorAll('.avatar-tabs button');
        var contents = document.querySelectorAll('.tab-content');
        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                tabs.forEach(function(t) { t.classList.remove('active'); });
                contents.forEach(function(c) { c.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Tab').classList.add('active');
            });
        });
        var grid = document.getElementById('avatarGrid');
        grid.innerHTML = avatarList.map(function(a) { return '<div class="avatar-option" data-emoji="' + a + '">' + a + '</div>'; }).join('');
        grid.addEventListener('click', function(e) {
            if (e.target.classList.contains('avatar-option')) {
                document.querySelectorAll('.avatar-option').forEach(function(el) { el.classList.remove('selected'); });
                e.target.classList.add('selected');
                selectedAvatar = e.target.dataset.emoji;
                selectedFile = null;
                document.getElementById('uploadPreview').style.display = 'none';
            }
        });
        var uploadArea = document.getElementById('uploadArea');
        var fileInput = document.getElementById('avatarFile');
        var preview = document.getElementById('uploadPreview');
        uploadArea.addEventListener('click', function() { fileInput.click(); });
        uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]); });
        fileInput.addEventListener('change', function(e) { if (e.target.files[0]) handleFileSelect(e.target.files[0]); });
    }

    function handleFileSelect(file) {
        if (!file.type.startsWith('image/')) { Toast.warning('请选择图片文件'); return; }
        if (file.size > 10 * 1024 * 1024) { Toast.warning('图片大小不能超过10MB'); return; }
        selectedFile = file;
        selectedAvatar = null;
        var reader = new FileReader();
        reader.onload = function(e) { document.getElementById('uploadPreview').src = e.target.result; document.getElementById('uploadPreview').style.display = 'block'; };
        reader.readAsDataURL(file);
        document.querySelectorAll('.avatar-option').forEach(function(el) { el.classList.remove('selected'); });
    }

    // 初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadProfile);
    } else {
        loadProfile();
    }
})();
</script>
