<article class="post-detail-card">
    <header class="post-detail-header">
        <h1 id="post-title" class="post-detail-title">加载中...</h1>
        <div class="post-detail-meta">
            <span id="post-date">📅 --</span>
            <span id="post-category" style="display:none;">📁 <a href="#" id="category-link"></a></span>
            <span id="post-views">👁️ <span class="stat-num">0</span> 阅读</span>
            <span id="post-comments">💬 <span class="stat-num">0</span> 评论</span>

        <div id="post-tags" class="post-detail-tags"></div>
        <a id="post-3d-entry" href="#" class="post-3d-btn" style="display:none;">

    <div id="post-content" class="post-detail-content">
        <p style="text-align: center; color: var(--text-light);">正在加载文章内容...</p>
    </div>

    <footer class="post-detail-footer">

                <span class="nav-label">← 上一篇</span>

            <a id="next-post" href="#" class="post-nav-item" style="visibility: hidden;">

                <span class="nav-title"></span>
            </a>
