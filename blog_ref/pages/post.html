<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 | Wuming Blog</title>
    <link rel="icon" href="/blog_ref/assets/images/icon.ico">
    <link rel="stylesheet" href="/blog_ref/css/global.css?v=1">
    <link rel="stylesheet" href="/blog_ref/css/pages.css?v=10">
    <link rel="stylesheet" href="/blog_ref/css/toast.css?v=4">
</head>
<body>
    <div class="bg-decoration">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <nav class="navbar">
        <a href="/blog_ref/" class="logo">
            <span>✨</span>
            Wuming Blog
        </a>
        <div class="nav-links" id="nav-links">
            <a href="/blog_ref/">首页</a>
            <a href="/blog_ref/pages/archive.html">文章</a>
            <a href="/blog_ref/pages/tools.html">🔧 工具</a>
            <a href="/blog_ref/pages/about.html">关于</a>
            <a href="/blog_ref/pages/login.html">🔐</a>
        </div>
        <button class="menu-toggle" id="menu-toggle" aria-label="菜单">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- 移动端侧边栏 -->
    <div class="mobile-sidebar" id="mobile-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-avatar">💫</div>
            <h3>Wuming Blog</h3>
            <p>🌈 永远相信美好的事情即将发生</p>
        </div>
        <div class="sidebar-nav">
            <a href="/blog_ref/" class="sidebar-nav-item">
                <span>🏠</span> 首页
            </a>
            <a href="/blog_ref/pages/archive.html" class="sidebar-nav-item">
                <span>📜</span> 文章
            </a>
            <a href="/blog_ref/pages/tools.html" class="sidebar-nav-item">
                <span>🔧</span> 工具箱
            </a>
            <a href="/blog_ref/pages/about.html" class="sidebar-nav-item">
                <span>👋</span> 关于
            </a>
            <a href="/blog_ref/pages/login.html" class="sidebar-nav-item">
                <span>🔐</span> 登录
            </a>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <nav class="toc" id="toc">
        <button class="toc-toggle" id="toc-toggle" title="折叠大纲">▶</button>
        <div class="toc-inner">
            <div class="toc-header">大纲</div>
            <ul class="toc-list" id="toc-list"></ul>
        </div>
    </nav>

    <main class="post-detail-container" id="page-content">
        <article class="post-detail-card">
            <header class="post-detail-header">
                <h1 id="post-title" class="post-detail-title">加载中...</h1>
                <div class="post-detail-meta">
                    <span id="post-date">📅 --</span>
                    <span id="post-category" style="display:none;">📁 <a href="#" id="category-link"></a></span>
                    <span id="post-views">👁️ <span class="stat-num">0</span> 阅读</span>
                    <span id="post-comments">💬 <span class="stat-num">0</span> 评论</span>
                </div>
                <div id="post-tags" class="post-detail-tags"></div>
                <a id="post-3d-entry" href="#" class="post-3d-btn" style="display:none;">
                    🚀 3D 沉浸阅读
                </a>
            </header>

            <div id="post-content" class="post-detail-content">
                <p style="text-align: center; color: var(--text-light);">正在加载文章内容...</p>
            </div>

            <footer class="post-detail-footer">
                <div id="post-nav" class="post-nav">
                    <a id="prev-post" href="#" class="post-nav-item" style="visibility: hidden;">
                        <span class="nav-label">← 上一篇</span>
                        <span class="nav-title"></span>
                    </a>
                    <a id="next-post" href="#" class="post-nav-item" style="visibility: hidden;">
                        <span class="nav-label">下一篇 →</span>
                        <span class="nav-title"></span>
                    </a>
                </div>
            </footer>
        </article>

        <section class="comments-section">
            <div class="comments-header">
                <h2>💬 评论 (<span id="comment-count">0</span>)</h2>
            </div>

            <form id="comment-form" class="comment-form">
                <!-- 评论表单内容由 JS 动态生成 -->
            </form>

            <div id="comments-list" class="comments-list"></div>
        </section>
    </main>

    <footer class="footer">
        <p>Powered by <span class="footer-heart">❤️</span> Wuming Blog © 2026</p>
    </footer>

    <script src="/blog_ref/js/page-transition.js?v=4"></script>
    <script src="/blog_ref/js/marked.min.js"></script>
    <script src="/blog_ref/js/global.js?v=23"></script>
    <script src="/blog_ref/js/toast.js?v=6"></script>
    <script src="/blog_ref/js/post.js?v=13"></script></body>
</html>
