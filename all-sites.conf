server {
    listen 80;
    listen [::]:80;

    server_name _;

    # ===== 根路径：中转站 Hub =====
    location / {
        root /var/www/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # ===== 博客：路径 /blog/ =====
    location /blog/ {
        alias /var/www/blog/;
        index index.html index.htm index.php;
        try_files $uri $uri/ =404;

        location ~ ^/blog/(.*\.php)$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/blog/$1;
        }
    }

    # ===== 博客外部资源重定向（PHP 数据返回绝对路径，转到 /blog/ 内） =====
    location /assets/images/ {
        rewrite ^/assets/(.*) /blog/assets/$1 last;
    }
    location /data/avatars/ {
        rewrite ^/data/(.*) /blog/data/$1 last;
    }

    # ===== 编程大赛软件站：路径 /CelestialSimulation/ =====
    location /CelestialSimulation/ {
        alias /var/www/CelestialSimulation/;
        charset utf-8;
        index index.html index.htm index.php;
        try_files $uri $uri/ =404;

        location ~ ^/CelestialSimulation/(.*\.php)$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/CelestialSimulation/$1;
        }
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/html;
    }
}